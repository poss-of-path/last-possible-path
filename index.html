<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last Possible Path</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #111;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .screen {
    display: none;
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    padding: 60px 32px;
    flex-direction: column;
    justify-content: center;
    animation: fadeUp 0.45s ease forwards;
  }
  .screen.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── STEP BAR ── */
  .step-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 48px;
  }
  .step-dot {
    height: 3px;
    flex: 1;
    background: #e0e0e0;
    border-radius: 2px;
    transition: background 0.4s;
  }
  .step-dot.done { background: #111; }

  /* ── EYEBROW ── */
  .eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 28px;
  }

  /* ── QUESTION ── */
  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 600;
    line-height: 1.3;
    color: #111;
    margin-bottom: 52px;
  }

  /* ── 3 DOORS ── */
  .doors {
    display: flex;
    gap: 12px;
    align-items: stretch;
    margin-bottom: 0;
  }

  .door {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 14px;
    padding: 22px 10px 20px;
    border: 1.5px solid #e0e0e0;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, transform 0.15s;
    font-family: 'Inter', sans-serif;
    min-height: 130px;
    position: relative;
  }
  .door:hover {
    border-color: #111;
    background: #f9f9f9;
    transform: translateY(-3px);
  }
  .door.selected {
    border-color: #111;
    background: #111;
    color: #fff;
    transform: translateY(-3px);
  }

  .door-arrow {
    font-size: 22px;
    line-height: 1;
    flex-shrink: 0;
  }

  .door-label {
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.02em;
  }

  /* ── START SCREEN ── */
  #screen-start .big-serif {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 10vw, 66px);
    font-weight: 700;
    line-height: 1.05;
    color: #111;
    margin-bottom: 24px;
  }
  #screen-start .big-serif em {
    font-style: italic;
    color: #555;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    line-height: 1.7;
    margin-bottom: 40px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 32px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    align-self: flex-start;
  }
  .btn-primary:hover { background: #333; transform: translateY(-1px); }

  /* ── RESULT ── */
  .result-clue-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 16px;
  }
  .clue-box {
    border: 1.5px solid #111;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 160px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .clue-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: #111;
  }
  .clue-letter {
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    font-weight: 700;
    color: #111;
    line-height: 1;
  }
  .result-card {
    border: 1.5px solid #e0e0e0;
    border-radius: 4px;
    padding: 24px 22px;
    margin-bottom: 24px;
  }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: #111;
    margin-bottom: 10px;
  }
  .result-scene {
    font-size: 13px;
    color: #555;
    line-height: 1.8;
  }
  .result-scene strong { color: #111; font-weight: 600; }
  .fate-note {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .replay-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: transparent;
    color: #111;
    border: 1.5px solid #111;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .replay-btn:hover { background: #111; color: #fff; }
</style>
</head>
<body>

<!-- ══════════ START ══════════ -->
<div id="screen-start" class="screen active">
  <p class="eyebrow">Last Possible Path</p>
  <div class="big-serif">Every<br>choice<br><em>leads here.</em></div>
  <p class="subtitle">Six turns. Three directions.<br>No matter which way you go, a clue has always been waiting.</p>
  <button class="btn-primary" onclick="startGame()">Enter the maze &rarr;</button>
</div>

<!-- ══════════ QUESTION ══════════ -->
<div id="screen-question" class="screen">
  <div class="step-bar" id="q-step-bar"></div>
  <p class="eyebrow" id="q-eyebrow">Path 1 of 6</p>
  <div class="q-text" id="q-title">—</div>
  <div class="doors" id="q-doors"></div>
</div>

<!-- ══════════ RESULT ══════════ -->
<div id="screen-result" class="screen">
  <div class="step-bar">
    <div class="step-dot done"></div><div class="step-dot done"></div>
    <div class="step-dot done"></div><div class="step-dot done"></div>
    <div class="step-dot done"></div><div class="step-dot done"></div>
    <div class="step-dot done"></div>
  </div>
  <p class="result-clue-label">In this path, you've possibly met one of the clue</p>
  <div class="clue-box"><div class="clue-letter" id="res-letter">—</div></div>
  <div class="result-card">
    <div class="result-title" id="res-ending-title">—</div>
    <div class="result-scene" id="res-scene">—</div>
  </div>
  <p class="fate-note" id="res-fate">—</p>
  <button class="replay-btn" onclick="restart()">↩ Try another path</button>
</div>

<script>
const QUESTIONS = [
  {
    title: "Doi ngelirik kamu dari ujung kelas. Serius deh.",
    choices: [
      { arrow: "←", label: "Pura buta",      weights: { N:2, M:1 } },
      { arrow: "↑", label: "Tatap balik gas", weights: { A:2, R:1 } },
      { arrow: "→", label: "Senyum dikit",   weights: { R:2, I:1 } }
    ]
  },
  {
    title: "Doi chat jam 2 malem. 'Lagi apa?'",
    choices: [
      { arrow: "←", label: "Ghosting",       weights: { N:2, I:1 } },
      { arrow: "↑", label: "Bales slow",     weights: { M:2, N:1 } },
      { arrow: "→", label: "Gas langsung",   weights: { A:2, R:1 } }
    ]
  },
  {
    title: "Ketemu doi di minimarket. Awkward banget.",
    choices: [
      { arrow: "←", label: "Kabur ke lorong", weights: { N:2, M:1 } },
      { arrow: "↑", label: "Sok gak liat",   weights: { I:2, N:1 } },
      { arrow: "→", label: "Sapa duluan",    weights: { A:2, R:1 } }
    ]
  },
  {
    title: "Doi ninggalin earphone di mejamu.",
    choices: [
      { arrow: "←", label: "Simpen aja deh", weights: { M:2, A:1 } },
      { arrow: "↑", label: "Titip note receh", weights: { I:2, M:1 } },
      { arrow: "→", label: "Langsung balikin", weights: { R:2, N:1 } }
    ]
  },
  {
    title: "Story-nya itu foto sunset. Captionnya '…'",
    choices: [
      { arrow: "←", label: "Cukup nonton",   weights: { N:2, I:1 } },
      { arrow: "↑", label: "React aja dulu", weights: { M:2, R:1 } },
      { arrow: "→", label: "DM langsung",    weights: { A:2, R:1 } }
    ]
  },
  {
    title: "Doi bilang 'kamu tuh beda ya.' Maksudnya???",
    choices: [
      { arrow: "←", label: "Ketawa doang",   weights: { I:2, N:1 } },
      { arrow: "↑", label: "Nanya balik",    weights: { A:2, M:1 } },
      { arrow: "→", label: "Pura seneng",    weights: { R:2, I:1 } }
    ]
  },
  {
    title: "Hari terakhir. Doi masih di sana.",
    choices: [
      { arrow: "←", label: "Pergi diam",     weights: { N:2, M:1 } },
      { arrow: "↑", label: "Deketin gas",    weights: { R:2, A:1 } },
      { arrow: "→", label: "Slip note receh", weights: { I:2, R:1 } }
    ]
  }
];

const ENDINGS = {
  M: {
    letter: "M",
    title: "The Moment Between Words",
    scene: `Every path you took was <strong>quiet</strong> — measured, intentional, unhurried. You didn't chase. You <strong>held space</strong>. And in that space, something settled between you without needing a name. They knew. You knew. The silence was full.`,
    fate: "M is for the moment that doesn't announce itself — it just arrives, and you were still enough to feel it."
  },
  A: {
    letter: "A",
    title: "The Arrival",
    scene: `You <strong>moved first</strong>. You spoke first. You closed distances before they had a chance to grow. And they responded — not because they had to, but because your <strong>honesty made it easy</strong>. You didn't wait for a sign. You became one.`,
    fate: "A is for the one who arrives — not late, not early. Exactly when they're supposed to."
  },
  R: {
    letter: "R",
    title: "The Return",
    scene: `Something about your path kept <strong>circling back</strong>. Not a mistake — a rhythm. You moved toward and away, uncertain and then sure, and in that arc you found something more honest than a straight line ever could be. <strong>You came back</strong>. So did they.`,
    fate: "R is for return — because the most meaningful things don't arrive in straight lines."
  },
  N: {
    letter: "N",
    title: "The Not-Yet",
    scene: `You held back. You <strong>watched more than you moved</strong>. Not from fear — from a kind of careful wonder. This path didn't end in a confession or a grand gesture. It ended in <strong>possibility</strong>, intact, unruined, quietly waiting. Not every story needs its next chapter today.`,
    fate: "N is for not yet — the most gentle and most honest ending there is."
  },
  I: {
    letter: "I",
    title: "The Impression",
    scene: `You left something behind — a note, a song, a look that lasted a second too long. <strong>You were felt before you were known</strong>. They carried you in a small way they couldn't explain. This path didn't end with you together. It ended with you <strong>unforgettable</strong>.`,
    fate: "I is for impression — the kind that stays without asking permission."
  }
};

let currentQ = 0;
let scores = {};
let chosen = null;

function startGame() {
  currentQ = 0;
  scores = { M:0, A:0, R:0, N:0, I:0 };
  chosen = null;
  renderQuestion();
  go('screen-question');
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  chosen = null;

  // step bar
  const bar = document.getElementById('q-step-bar');
  bar.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i < currentQ ? ' done' : '');
    bar.appendChild(d);
  }

  document.getElementById('q-eyebrow').textContent = `Path ${currentQ + 1} of 7`;
  document.getElementById('q-title').textContent = q.title;

  // doors
  const container = document.getElementById('q-doors');
  container.innerHTML = '';

  q.choices.forEach((c, idx) => {
    const door = document.createElement('button');
    door.className = 'door';
    door.innerHTML = `<span class="door-arrow">${c.arrow}</span><span class="door-label">${c.label}</span>`;
    door.onclick = () => {
      if (chosen !== null) return;
      chosen = idx;
      container.querySelectorAll('.door').forEach(d => d.classList.remove('selected'));
      door.classList.add('selected');
      setTimeout(nextQuestion, 480);
    };
    container.appendChild(door);
  });
}

function nextQuestion() {
  if (chosen === null) return;
  const w = QUESTIONS[currentQ].choices[chosen].weights;
  for (const [k, v] of Object.entries(w)) scores[k] += v;
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showResult();
  } else {
    const screen = document.getElementById('screen-question');
    screen.classList.remove('active');
    void screen.offsetWidth;
    screen.classList.add('active');
    renderQuestion();
  }
}

function showResult() {
  const order = ['M','A','R','N','I'];
  let winner = order[0];
  for (const k of order) if (scores[k] > scores[winner]) winner = k;
  const e = ENDINGS[winner];
  document.getElementById('res-letter').textContent = e.letter;
  document.getElementById('res-ending-title').textContent = e.title;
  document.getElementById('res-scene').innerHTML = e.scene;
  document.getElementById('res-fate').textContent = e.fate;
  go('screen-result');
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function restart() { go('screen-start'); }
</script>
</body>
</html>
